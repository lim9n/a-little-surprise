<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Little Surprise</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
font-family:Arial;
}

/* card frame */

.card{
width:350px;
background:white;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
padding:25px;
text-align:center;
animation:fade 2s;
}

/* photo frame */

.photo{
width:100%;
height:220px;
border-radius:15px;
background:url("https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e")
center/cover;
margin-bottom:20px;
border:5px solid #ffd1dc;
}

h1{
color:#ff4d6d;
margin:10px 0;
}

p{
color:#555;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#message{
display:none;
margin-top:15px;
color:#444;
font-size:18px;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;}
}

</style>
</head>

<body>

<div class="card">

<div class="photo"></div>

<h1>Hello You 🌸</h1>

<p>I made something small for your special day.</p>

<button onclick="show()">Open</button>

<div id="message">
Happy Birthday in advance 🎂  
You make the world a little brighter.
</div>

</div>

<script>
function show(){
document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
